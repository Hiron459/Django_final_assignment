{% load static %}
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}StockFlow{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{% url 'dashboard' %}">StockFlow <span>備品管理</span></a>
    <nav><a href="{% url 'dashboard' %}">ダッシュボード</a><a href="{% url 'loan_list' %}">貸出履歴</a><a class="button small" href="{% url 'loan_create' %}">＋ 貸出登録</a></nav>
  </header>
  <main class="container">
    {% if messages %}{% for message in messages %}<div class="message {{ message.tags }}">{{ message }}</div>{% endfor %}{% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
